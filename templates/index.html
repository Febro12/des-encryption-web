<!DOCTYPE html>
<html>
<head>
<title>DES Encryption Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h4 class="text-muted">
Program Enkripsi dan Dekripsi menggunakan algoritma Data Encryption Standard (DES)
</h4>

<hr>

<h1 class="mt-4">Enkripsi Pesan</h1>

<form method="POST">

<div class="mb-3">

<label class="form-label">
Masukkan Teks Biasa (Plain Text)
</label>

<textarea class="form-control" name="pesan" rows="5" required></textarea>

</div>

<div class="mb-3">

<label class="form-label">
Mode Cipher
</label>

<select class="form-select">
<option>ECB</option>
<option>CBC</option>
</select>

</div>

<div class="mb-3">

<label class="form-label">
Kunci Rahasia
</label>

<input type="text" class="form-control" placeholder="8 karakter key">

</div>

<button class="btn btn-danger">
Enkripsi Data
</button>

</form>

<hr class="mt-5">

<h5>Ciphertext</h5>

<div class="alert alert-secondary">
{{ ciphertext }}
</div>

<h5>Hasil Dekripsi</h5>

<div class="alert alert-success">
{{ decrypted }}
</div>

</div>

</body>
</html>
